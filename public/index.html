<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Last Hearth</title>
    <style>
        /* Critical CSS для мгновенного отображения */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
        }
        #loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f23;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        #loading-screen h1 {
            font-size: 2em;
            color: #e74c3c;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }
        .loader {
            width: 50px; height: 50px;
            border: 3px solid #2a2a4a;
            border-top-color: #e74c3c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 15px;
            color: #666;
            font-size: 0.9em;
        }
        #game-content { display: none; }
    </style>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.error('SW registration failed:', err);
                });
            });
        }
    </script>
</head>
<body>
    <!-- Экран загрузки -->
    <div id="loading-screen">
        <h1>LAST HEARTH</h1>
        <div class="loader"></div>
        <p class="loading-text">Загрузка убежища...</p>
    </div>

    <!-- Основной контент -->
    <div id="game-content" style="display: none;">
        <!-- Навигация -->
        <nav id="bottom-nav">
            <button class="nav-btn active" data-screen="main">🏠</button>
            <button class="nav-btn" data-screen="map">🗺️</button>
            <button class="nav-btn" data-screen="inventory">🎒</button>
            <button class="nav-btn" data-screen="bosses">👹</button>
            <button class="nav-btn" data-screen="clans">🏰</button>
        </nav>
    </div>

    <script src="game.js" nonce="{{nonce}}"></script>
</body>
</html>
